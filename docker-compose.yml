version: '3.8'
services:
  front:
    build: ./public
    ports:
      - 3000:3000
  api:
    build: ./server
    ports:
      - 5000:5000
  database:
    mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
